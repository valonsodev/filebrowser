name: Build and Push to hub.fran.cam

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays

jobs:
  build:
    runs-on: docker
    container:
      image: hub.fran.cam/runner:latest@sha256:7a6052cc9ed72191bec8a97ef850350b1cbd2595b33d12fab94e721d6fc0f8bd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build runner image
        run: |
          docker build -t hub.fran.cam/filebrowser:latest .

      - name: Push runner image
        if: github.event_name == 'push'
        run: |
          docker push hub.fran.cam/filebrowser:latest
