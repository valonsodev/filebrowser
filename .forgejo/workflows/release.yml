name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: docker
    container:
      image: git.fran.cam/homelab/runner:latest@sha256:47b10bd0c06e296e37c53360ed1ee1f9b1799ab3753adc0a8b3eff409656a21d
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build Docker image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          docker build -t git.fran.cam/homelab/filebrowser:${VERSION} .
          docker tag git.fran.cam/homelab/filebrowser:${VERSION} git.fran.cam/homelab/filebrowser:latest

      - name: Login to registry
        run: |
          echo "${{ secrets.BOT_PASSWORD }}" | docker login git.fran.cam -u "bot@fran.cam" --password-stdin

      - name: Push Docker images
        run: |
          VERSION=${{ steps.version.outputs.version }}
          docker push git.fran.cam/homelab/filebrowser:${VERSION}
          docker push git.fran.cam/homelab/filebrowser:latest

      - name: Create release
        uses: https://code.forgejo.org/actions/forgejo-release@v2.5.0
        with:
          url: "https://git.fran.cam"
          repo: "homelab/filebrowser"
          direction: upload
          tag: "${{ github.ref_name }}"
          sha: "${{ github.sha }}"
          token: ${{ secrets.TOKEN }}
          override: ${{ vars.OVERRIDE || "false" }}
          verbose: ${{ vars.VERBOSE || "false" }}
          hide-archive-link: true
          release-notes-assistant: true
