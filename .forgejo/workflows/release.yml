name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: docker
    container:
      image: git.fran.cam/homelab/runner:latest@sha256:81686ce4c019de0f7c46bb93666289062a7a679e76f44a8bdd3c4a4d49dc4316
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w -X main.GitCommit=${GIT_COMMIT} -X main.BuildDate=${BUILD_DATE}"

          mkdir -p dist

          # Linux AMD64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/filebrowser-linux-amd64 main.go

          # Linux ARM64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LDFLAGS}" -o dist/filebrowser-linux-arm64 main.go

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: publish release
        uses: https://code.forgejo.org/actions/forgejo-release@v2.5.0
        with:
          url: "https://git.fran.cam"
          repo: "homelab/filebrowser"
          direction: upload
          tag: "${{ github.ref_name }}"
          sha: "${{ github.sha }}"
          release-dir: release
          token: ${{ secrets.TOKEN }}
          override: ${{ vars.OVERRIDE || "false" }}
          verbose: ${{ vars.VERBOSE || "false" }}
          hide-archive-link: true
          release-notes-assistant: true
